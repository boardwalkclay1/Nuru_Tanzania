    <a href="menu.html">Food</a>

<!-- HERO -->
<section class="hero" style="

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
">

    <h2 class="hero-title">Admin Dashboard</h2>

    </p>

    <p style="font-size:22px; margin-top:10px;">
      <strong>Staff 90%:</strong> <span id="admin-staff">$0.00</span>
    </p>

  <section>

    <div id="admin-orders" class="popular-grid" style="margin-top:20px;"></div>
  </section>
